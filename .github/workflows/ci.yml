# CI-пайплайн: запускается на каждый push в main и на каждый pull request.
# Job "test" гоняет линтер и тесты в том же Python 3.11, что и Docker-образ.
# Job "validate-manifests" проверяет YAML в k8s/ по JSON-схемам Kubernetes.
# Job "build" (push в main или релизный тег v*, после успешных проверок)
# собирает Docker-образ с кэшем слоёв, публикует его в GHCR и сканирует Trivy.
name: CI

on:
  push:
    branches: [main]
    # Git-теги вида v1.0.0 собирают именованный релиз с тегами v1.0.0 и 1.0
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: python -m pytest tests/ -v

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      # -strict запрещает неизвестные поля (ловит опечатки вроде replicsa).
      # Вторая schema-location нужна для CRD (PodMonitor — не встроенный ресурс,
      # его схема берётся из каталога CRDs-catalog).
      - name: Validate Kubernetes manifests
        run: >
          kubeconform -strict -summary
          -schema-location default
          -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          k8s/

  build:
    # needs: все проверки — обязательное условие; if: собираем main и релизные теги, не PR
    needs: [test, validate-manifests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    # GITHUB_TOKEN по умолчанию не может писать в реестр — выдаём право явно.
    # Когда permissions указан, все остальные права сбрасываются в none,
    # поэтому contents: read нужен для checkout.
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Buildx нужен для кэша слоёв type=gha (обычный docker-драйвер его не умеет)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # metadata-action генерирует теги по типу события:
      # push в main   -> полный SHA + latest
      # git-тег v1.2.3 -> v1.2.3 и 1.2 (+ SHA)
      # Имя в GHCR обязано быть в нижнем регистре.
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lovelybbot/k8s-labs/myapp
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Кэш слоёв между запусками: пока requirements.txt не меняется,
          # слой с pip install берётся из кэша GitHub Actions за секунды
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Скан образа на известные уязвимости (CVE) в базовом образе и
      # python-пакетах. Мягкий режим: exit-code 0 — отчёт в логе, пайплайн
      # не падает. Для строгого режима поменяйте exit-code на 1.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/lovelybbot/k8s-labs/myapp:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"

  # CD-звено (GitOps): прописывает свежесобранный тег в манифест и коммитит
  # в main. Argo CD в кластере видит новый коммит и раскатывает его сам.
  # Коммиты от GITHUB_TOKEN не запускают workflow повторно (защита GitHub
  # от рекурсии), [skip ci] в сообщении — дополнительная страховка.
  update-manifest:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag to commit SHA
        run: >
          sed -i
          "s|image: ghcr.io/lovelybbot/k8s-labs/myapp:.*|image: ghcr.io/lovelybbot/k8s-labs/myapp:${{ github.sha }}|"
          k8s/app-deployment.yaml

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/app-deployment.yaml
          git diff --cached --quiet || git commit -m "cd: деплой myapp:${{ github.sha }} [skip ci]"
          git push
